<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUSIC NOOO | OFFICIAL</title>
    <link rel="icon" type="image/png" href="https://img.icons8.com/neon/96/musical-notes.png">
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #00f2ff; --secondary: #7000ff; --bg: #050505; --text: #ffffff;
            --glass: rgba(255, 255, 255, 0.05); --card-border: rgba(255, 255, 255, 0.1);
            --blur: blur(20px); --shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        [data-theme="light"] {
            --primary: #0072ff; --secondary: #6200ea; --bg: #eef2f7; --text: #1a1a1a;
            --glass: rgba(255, 255, 255, 0.75); --card-border: rgba(0, 0, 0, 0.05);
            --blur: blur(15px); --shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* Essential Fix: Stop horizontal shaking */
        html, body { 
            margin: 0; padding: 0; width: 100%; overflow-x: hidden; 
            background-color: var(--bg); color: var(--text); font-family: 'Poppins', sans-serif;
            transition: background 0.5s ease;
        }

        .liquid-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1;
            background: linear-gradient(135deg, var(--bg) 20%, var(--secondary) 150%);
            opacity: 0.4;
        }

        nav {
            position: fixed; top: 25px; left: 50%; transform: translateX(-50%);
            background: var(--glass); backdrop-filter: var(--blur);
            padding: 8px 20px; border-radius: 100px; display: flex; gap: 10px; align-items: center;
            border: 1px solid var(--card-border); z-index: 1000; box-shadow: var(--shadow);
            width: max-content; white-space: nowrap;
        }
        nav a { color: var(--text); text-decoration: none; font-weight: 700; font-size: 0.65rem; letter-spacing: 1.5px; padding: 10px 15px; border-radius: 50px; transition: 0.3s; }
        nav a.active { background: var(--primary); color: #000; box-shadow: 0 0 15px var(--primary); }

        .theme-btn { width: 35px; height: 35px; background: var(--text); color: var(--bg); border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 1rem; margin-left: 5px; }

        section { display: none; padding: 140px 20px 60px; text-align: center; max-width: 1200px; margin: 0 auto; animation: slideIn 0.6s ease; }
        section.active { display: block; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .hero h1 { font-family: 'Syncopate', sans-serif; font-size: clamp(2rem, 8vw, 5rem); line-height: 1; margin-bottom: 20px; }
        .neon { color: var(--primary); text-shadow: 0 0 20px var(--primary); }

        /* --- STABLE AUTO SLIDER --- */
        .preview-wrapper { 
            width: 100%; margin: 40px 0; overflow: hidden; 
            mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent); 
            -webkit-mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
        }
        .preview-container { display: flex; gap: 20px; width: max-content; animation: autoScroll 40s linear infinite; padding: 10px 0; }
        .preview-container:hover { animation-play-state: paused; }

        @keyframes autoScroll {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); } /* Half of the doubled content */
        }

        .preview-item {
            width: 280px; height: 160px; border-radius: 25px; 
            background-size: cover; background-position: center;
            border: 2px solid var(--card-border); cursor: pointer;
            box-shadow: var(--shadow); flex-shrink: 0;
            display: flex; align-items: flex-end; padding: 15px;
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 30px; }
        .glass-card { background: var(--glass); backdrop-filter: var(--blur); border-radius: 30px; padding: 20px; border: 1px solid var(--card-border); box-shadow: var(--shadow); transition: 0.3s; }
        .glass-card img { width: 100%; border-radius: 20px; margin-bottom: 15px; }
        
        .btn { padding: 10px 20px; border-radius: 12px; text-decoration: none; font-weight: 700; font-size: 0.75rem; display: inline-block; transition: 0.3s; }
        .btn-main { background: var(--primary); color: #000; }
        .btn-outline { border: 1.5px solid var(--primary); color: var(--text); margin-left: 5px; }
.footer-section {
    width: 100%;
    padding: 40px 20px;
    margin-top: 60px;
    background: var(--glass);
    backdrop-filter: var(--blur);
    border-top: 1px solid var(--card-border);
    text-align: center;
}

.footer-content p {
    color: var(--text);
    font-size: 0.85rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 500;
}

/* Mobile වලට පොඩ්ඩක් අකුරු කුඩා කරන්න */
@media (max-width: 600px) {
    .footer-content p {
        font-size: 0.7rem;
        letter-spacing: 1px;
    }
}
    </style>
</head>
<body>
    <div class="liquid-bg"></div>

    <nav>
        <a href="#" onclick="showPage('home')" id="nav-home" class="active">HOME</a>
        <a href="#" onclick="showPage('videos')" id="nav-videos">VIDEOS</a>
        <a href="#" onclick="showPage('contact')" id="nav-contact">CONTACT</a>
        <div class="theme-btn" onclick="toggleTheme()"><i class="fas fa-moon" id="t-icon"></i></div>
    </nav>

    <section id="home" class="active">
        <p style="letter-spacing: 5px; opacity: 0.6; font-size: 0.7rem; margin-bottom: 10px;">OFFICIAL PORTAL</p>
        <h1>MUSIC <br><span class="neon">NOOO</span></h1>
        
        <div class="preview-wrapper">
            <div class="preview-container" id="home-preview"></div>
        </div>
        
        <a href="#" onclick="showPage('videos')" class="btn btn-main" style="padding: 15px 35px; border-radius: 50px;">BROWSE MUSIC</a>
    </section>

    <section id="videos">
        <h2 style="font-family: 'Syncopate'; margin-bottom: 30px;">THE <span class="neon">LIBRARY</span></h2>
        <div class="grid" id="video-container"></div>
    </section>

    <section id="contact">
        <div class="glass-card" style="max-width: 500px; margin: auto;">
            <h2 class="neon" style="font-family: 'Syncopate';">CONTACT</h2><br>
            <p id="latest-info" style="font-size: 0.9rem; opacity: 0.8;"></p><br>
            <h3 id="c-email" style="color: var(--primary); font-size: 1rem;"></h3><br>
            <div style="font-size: 1.5rem; display: flex; justify-content: center; gap: 20px;">
                <i class="fab fa-youtube"></i><i class="fab fa-instagram"></i><i class="fab fa-facebook"></i>
            </div>
        </div>
    </section>

    <script>
        function showPage(pageId) {
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.getElementById('nav-' + pageId).classList.add('active');
            window.scrollTo(0, 0);
        }

        function toggleTheme() {
            const body = document.documentElement;
            const icon = document.getElementById('t-icon');
            if (body.getAttribute('data-theme') === 'dark') {
                body.setAttribute('data-theme', 'light');
                icon.classList.replace('fa-moon', 'fa-sun');
            } else {
                body.setAttribute('data-theme', 'dark');
                icon.classList.replace('fa-sun', 'fa-moon');
            }
        }

        fetch('/videos.json').then(res => res.json()).then(data => {
            const container = document.getElementById('video-container');
            const preview = document.getElementById('home-preview');
            
            data.videos.forEach(v => {
                container.innerHTML += `
                    <div class="glass-card">
                        <img src="${v.thumbnail}" alt="thumb">
                        <h3 style="margin-bottom:15px; font-size: 0.9rem;">${v.title}</h3>
                        <div style="display:flex; gap: 5px;">
                            <a href="${v.youtube_link}" target="_blank" class="btn btn-main" style="flex:1;">WATCH</a>
                            <a href="${v.download_link}" class="btn btn-outline" style="flex:1;">MP3</a>
                        </div>
                    </div>`;
            });

            // Double content for smooth infinite loop
            const items = [...data.videos, ...data.videos]; 
            items.forEach(v => {
                preview.innerHTML += `
                    <div class="preview-item" style="background-image: linear-gradient(to top, rgba(0,0,0,0.8), transparent), url('${v.thumbnail}')" onclick="showPage('videos')">
                        <div style="font-weight: bold; font-size: 0.7rem; color: #fff; text-align:left;">${v.title}</div>
                    </div>`;
            });

            document.getElementById('c-email').innerText = data.contact.email;
            document.getElementById('latest-info').innerText = data.home_text;
        });
    </script>
    <footer class="footer-section">
    <div class="footer-content">
        <p>© 2024 <span class="neon">MUSIC NOOO</span>. All Rights Reserved.</p>
        <p style="font-size: 0.7rem; margin-top: 5px; opacity: 0.5;">Designed with ❤️ for Music Lovers</p>
    </div>
    </footer>
</body>
</html>
