<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUSIC NOOO | OFFICIAL</title>
    <link rel="icon" type="image/png" href="https://img.icons8.com/neon/96/musical-notes.png">
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* --- THEME SYSTEM --- */
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --bg: #050505;
            --text: #ffffff;
            --glass: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --blur: blur(20px);
            --shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        [data-theme="light"] {
            --primary: #0072ff;
            --secondary: #6200ea;
            --bg: #eef2f7;
            --text: #1a1a1a;
            --glass: rgba(255, 255, 255, 0.7);
            --card-border: rgba(0, 0, 0, 0.05);
            --blur: blur(15px);
            --shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: background 0.6s ease, color 0.6s ease, transform 0.3s ease; }
        
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: 'Poppins', sans-serif; 
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* --- MODERN LIQUID BACKGROUND --- */
        .liquid-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: linear-gradient(135deg, var(--bg) 20%, var(--secondary) 150%);
            opacity: 0.4;
        }
        .blob {
            position: absolute; width: 500px; height: 500px;
            background: var(--primary); filter: blur(120px);
            border-radius: 50%; opacity: 0.2; animation: move 20s infinite alternate;
        }
        @keyframes move { from { transform: translate(-10%, -10%); } to { transform: translate(50%, 30%); } }

        /* --- GLASS NAVIGATION --- */
        nav {
            position: fixed; top: 25px; left: 50%; transform: translateX(-50%);
            background: var(--glass); backdrop-filter: var(--blur);
            padding: 10px 30px; border-radius: 100px; display: flex; gap: 20px; align-items: center;
            border: 1px solid var(--card-border); z-index: 1000; box-shadow: var(--shadow);
        }
        nav a { color: var(--text); text-decoration: none; font-weight: 700; font-size: 0.75rem; letter-spacing: 2px; padding: 8px 15px; border-radius: 50px; }
        nav a.active { background: var(--primary); color: #000; box-shadow: 0 0 15px var(--primary); }

        /* --- THEME TOGGLE BUTTON --- */
        .theme-btn {
            width: 45px; height: 45px; background: var(--text); color: var(--bg);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            cursor: pointer; font-size: 1.2rem; margin-left: 10px;
        }

        /* --- HERO SECTION --- */
        section { display: none; padding: 140px 10% 60px; animation: slideIn 0.8s ease; }
        section.active { display: block; }
        @keyframes slideIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        .hero h1 { font-family: 'Syncopate', sans-serif; font-size: clamp(2.5rem, 8vw, 5.5rem); line-height: 0.9; }
        .neon { color: var(--primary); text-shadow: 0 0 30px var(--primary); }

        /* --- PREVIEW SLIDER --- */
        .preview-container {
            display: flex; gap: 20px; overflow-x: auto; padding: 40px 10px;
            scrollbar-width: none; mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
        }
        .preview-item {
            min-width: 300px; height: 180px; border-radius: 30px; 
            background-size: cover; background-position: center;
            border: 2px solid var(--card-border); cursor: pointer;
            box-shadow: var(--shadow); transition: 0.4s;
        }
        .preview-item:hover { transform: translateY(-10px) rotate(2deg); border-color: var(--primary); }

        /* --- VIDEO CARDS --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; }
        .glass-card {
            background: var(--glass); backdrop-filter: var(--blur); border-radius: 35px;
            padding: 25px; border: 1px solid var(--card-border); box-shadow: var(--shadow);
        }
        .glass-card img { width: 100%; border-radius: 25px; margin-bottom: 20px; }
        
        .btn {
            padding: 12px 25px; border-radius: 15px; text-decoration: none; font-weight: 700;
            font-size: 0.8rem; display: inline-block;
        }
        .btn-main { background: var(--primary); color: #000; box-shadow: 0 5px 20px rgba(0,242,255,0.4); }
        .btn-outline { border: 2px solid var(--primary); color: var(--text); margin-left: 10px; }

    </style>
</head>
<body>
    <div class="liquid-bg"></div>
    <div class="blob"></div>

    <nav>
        <a href="#" onclick="showPage('home')" id="nav-home" class="active">HOME</a>
        <a href="#" onclick="showPage('videos')" id="nav-videos">VIDEOS</a>
        <a href="#" onclick="showPage('contact')" id="nav-contact">CONTACT</a>
        <div class="theme-btn" onclick="toggleTheme()"><i class="fas fa-moon" id="t-icon"></i></div>
    </nav>

    <section id="home" class="active">
        <div class="hero">
            <p style="letter-spacing: 5px; opacity: 0.6; margin-bottom: 10px;">WELCOME TO</p>
            <h1>MUSIC <br><span class="neon">NOOO</span></h1>
            <p id="latest-info" style="margin-top: 20px; max-width: 600px; opacity: 0.8;"></p>
            
            <div class="preview-container" id="home-preview"></div>
            
            <a href="#" onclick="showPage('videos')" class="btn btn-main" style="margin-top: 20px; padding: 18px 45px; border-radius: 50px;">EXPLORE NOW</a>
        </div>
    </section>

    <section id="videos">
        <h2 style="font-family: 'Syncopate'; margin-bottom: 40px;">THE <span class="neon">LIBRARY</span></h2>
        <div class="grid" id="video-container"></div>
    </section>

    <section id="contact">
        <div class="glass-card" style="max-width: 600px; margin: auto; text-align: center;">
            <h2 class="neon" style="font-family: 'Syncopate';">CONTACT</h2><br>
            <p>For any inquiries or music submissions, reach out to us:</p><br>
            <h3 id="c-email" style="color: var(--primary);"></h3><br>
            <div style="font-size: 2rem; display: flex; justify-content: center; gap: 30px;">
                <i class="fab fa-youtube"></i>
                <i class="fab fa-instagram"></i>
                <i class="fab fa-facebook"></i>
            </div>
        </div>
    </section>

    <script>
        function showPage(pageId) {
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.getElementById('nav-' + pageId).classList.add('active');
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function toggleTheme() {
            const body = document.documentElement;
            const icon = document.getElementById('t-icon');
            if (body.getAttribute('data-theme') === 'dark') {
                body.setAttribute('data-theme', 'light');
                icon.classList.replace('fa-moon', 'fa-sun');
            } else {
                body.setAttribute('data-theme', 'dark');
                icon.classList.replace('fa-sun', 'fa-moon');
            }
        }

        fetch('/videos.json').then(res => res.json()).then(data => {
            const container = document.getElementById('video-container');
            const preview = document.getElementById('home-preview');
            
            data.videos.forEach(v => {
                container.innerHTML += `
                    <div class="glass-card">
                        <img src="${v.thumbnail}" alt="thumb">
                        <h3 style="margin-bottom:20px; font-size: 1.1rem;">${v.title}</h3>
                        <a href="${v.youtube_link}" target="_blank" class="btn btn-main">WATCH</a>
                        <a href="${v.download_link}" class="btn btn-outline">MP3</a>
                    </div>`;
                
                preview.innerHTML += `
                    <div class="preview-item" style="background-image: linear-gradient(to top, rgba(0,0,0,0.8), transparent), url('${v.thumbnail}')" onclick="showPage('videos')">
                        <div style="padding: 20px; height: 100%; display: flex; align-items: flex-end; font-weight: bold; font-size: 0.8rem;">${v.title}</div>
                    </div>`;
            });

            document.getElementById('c-email').innerText = data.contact.email;
            document.getElementById('latest-info').innerText = data.home_text;
        });
    </script>
</body>
</html>
