<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUSIC NOOO</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/wh6rcMjT/FB-IMG-1774107258833.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #00f2ff; --secondary: #7000ff; --bg: #050505; --text: #ffffff;
            --glass: rgba(255, 255, 255, 0.05); --card-border: rgba(255, 255, 255, 0.1);
            --blur: blur(20px); --shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        [data-theme="light"] {
            --primary: #0072ff; --secondary: #6200ea; --bg: #eef2f7; --text: #1a1a1a;
            --glass: rgba(255, 255, 255, 0.75); --card-border: rgba(0, 0, 0, 0.05);
            --blur: blur(15px); --shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }

        html, body { 
            margin: 0; padding: 0; width: 100%; min-height: 100vh;
            background-color: var(--bg); color: var(--text); font-family: 'Poppins', sans-serif;
            transition: background 0.5s ease;
            display: flex; flex-direction: column; overflow-x: hidden;
        }

        /* --- PRELOADER --- */
        #preloader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; transition: 0.8s; }
        .loader-logo { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--primary); padding: 5px; animation: pulse 1.5s infinite alternate; }
        .loader-bar { width: 150px; height: 3px; background: rgba(255,255,255,0.1); margin-top: 20px; border-radius: 10px; overflow: hidden; }
        .loader-progress { width: 100%; height: 100%; background: var(--primary); animation: loading 2s infinite; }
        @keyframes pulse { from { transform: scale(1); opacity: 0.8; } to { transform: scale(1.1); opacity: 1; } }
        @keyframes loading { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
        .fade-out { opacity: 0; visibility: hidden; }

        /* --- 1. SKELETON LOADING --- */
        .skeleton { background: linear-gradient(90deg, var(--glass) 25%, var(--card-border) 50%, var(--glass) 75%); background-size: 200% 100%; animation: skeleton-loading 1.5s infinite; border-radius: 20px; height: 180px; width: 100%; }
        @keyframes skeleton-loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* --- 4. SCROLL REVEAL ANIMATION --- */
        .reveal { opacity: 0; transform: translateY(30px); transition: all 0.8s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }

        #toast {
            position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%);
            background: var(--glass); backdrop-filter: var(--blur);
            border: 1px solid var(--primary); color: var(--text);
            padding: 12px 25px; border-radius: 50px; font-size: 0.8rem;
            z-index: 2000; transition: 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); font-weight: 600;
        }
        #toast.show { bottom: 40px; }

        .categories { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 30px; }
        .cat-btn { padding: 8px 18px; border-radius: 50px; background: var(--glass); border: 1px solid var(--card-border); color: var(--text); cursor: pointer; font-size: 0.7rem; font-weight: 600; transition: 0.3s; }
        .cat-btn.active, .cat-btn:hover { background: var(--primary); color: #000; border-color: var(--primary); box-shadow: 0 0 15px var(--primary); }

        #backToTop { position: fixed; bottom: 30px; right: 30px; width: 45px; height: 45px; background: var(--primary); color: #000; border-radius: 50%; display: none; justify-content: center; align-items: center; cursor: pointer; z-index: 1000; box-shadow: 0 0 20px var(--primary); transition: 0.3s; border: none; }

        .waveform { display: flex; align-items: flex-end; gap: 3px; height: 30px; justify-content: center; margin-bottom: 15px; }
        .wave-bar { width: 3px; height: 100%; background: var(--primary); animation: wave 1s infinite alternate; border-radius: 10px; }
        .wave-bar:nth-child(2) { animation-delay: 0.2s; }
        .wave-bar:nth-child(3) { animation-delay: 0.4s; }
        @keyframes wave { from { height: 5px; } to { height: 30px; } }

        .trending-tag { position: absolute; top: 10px; right: 10px; background: #ff0055; color: #fff; font-size: 0.6rem; padding: 4px 10px; border-radius: 50px; font-weight: 700; box-shadow: 0 0 10px #ff0055; animation: blink 1s infinite; z-index: 5; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

        .liquid-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; background: linear-gradient(135deg, var(--bg) 20%, var(--secondary) 150%); opacity: 0.4; }
        nav { position: fixed; top: 25px; left: 50%; transform: translateX(-50%); background: var(--glass); backdrop-filter: var(--blur); padding: 8px 20px; border-radius: 100px; display: flex; gap: 10px; align-items: center; border: 1px solid var(--card-border); z-index: 1000; box-shadow: var(--shadow); width: max-content; }
        nav a { color: var(--text); text-decoration: none; font-weight: 700; font-size: 0.65rem; letter-spacing: 1.5px; padding: 10px 15px; border-radius: 50px; transition: 0.3s; cursor: pointer; }
        nav a.active { background: var(--primary); color: #000; }
        .theme-btn { width: 35px; height: 35px; background: var(--text); color: var(--bg); border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; }

        section { display: none; padding: 140px 20px 60px; text-align: center; max-width: 1200px; margin: 0 auto; animation: slideIn 0.6s ease; width: 100%; flex: 1; }
        section.active { display: block; }

        .hero h1 { font-family: 'Syncopate', sans-serif; font-size: clamp(2rem, 8vw, 5rem); margin-bottom: 20px; }
        .neon { color: var(--primary); text-shadow: 0 0 20px var(--primary); }

        .search-container { position: relative; max-width: 400px; margin: 0 auto 20px; }
        .search-bar { width: 100%; padding: 12px 20px 12px 45px; border-radius: 50px; background: var(--glass); border: 1px solid var(--card-border); color: var(--text); outline: none; }
        .search-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); opacity: 0.5; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 30px; }
        .glass-card { position: relative; background: var(--glass); backdrop-filter: var(--blur); border-radius: 30px; padding: 20px; border: 1px solid var(--card-border); transition: 0.3s; text-align: left; }
        .glass-card img { width: 100%; border-radius: 20px; margin-bottom: 15px; }
        
        .btn { padding: 10px 20px; border-radius: 12px; font-weight: 700; font-size: 0.75rem; display: inline-block; transition: 0.3s; cursor: pointer; text-decoration: none; border: none; }
        .btn-main { background: var(--primary); color: #000; }
        .btn-outline { border: 1.5px solid var(--primary); color: var(--primary); background: transparent; }
        .btn-outline:hover { background: var(--primary); color: #000; }

        /* --- 2. WHATSAPP BUTTON STYLE --- */
        .btn-whatsapp { color: #25D366; border: 1.5px solid #25D366; width: 45px; display: flex; align-items: center; justify-content: center; background: transparent; }
        .btn-whatsapp:hover { background: #25D366; color: #fff; }

        .footer-section { margin-top: auto; padding: 30px 20px; background: var(--glass); border-top: 1px solid var(--card-border); text-align: center; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div id="toast">Link Copied!</div>

    <div id="preloader">
        <img src="https://i.ibb.co/wh6rcMjT/FB-IMG-1774107258833.jpg" class="loader-logo">
        <div class="loader-bar"><div class="loader-progress"></div></div>
    </div>

    <button id="backToTop" onclick="window.scrollTo(0,0)"><i class="fas fa-arrow-up"></i></button>
    <div class="liquid-bg"></div>

    <nav>
        <a onclick="showPage('home')" id="nav-home" class="active">HOME</a>
        <a onclick="showPage('videos')" id="nav-videos">VIDEOS</a>
        <a onclick="showPage('contact')" id="nav-contact">CONTACT</a>
        <div class="theme-btn" onclick="toggleTheme()"><i class="fas fa-moon" id="t-icon"></i></div>
    </nav>

    <section id="home" class="active">
        <div class="waveform">
            <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
        </div>
        <h1>MUSIC <span class="neon">NOOO</span></h1>
        <div class="grid" id="featured-grid" style="margin-bottom: 30px;">
            <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
        </div>
        <a onclick="showPage('videos')" class="btn btn-main" style="padding: 15px 35px; border-radius: 50px;">BROWSE MUSIC</a>
    </section>

    <section id="videos">
        <div class="search-container">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="searchInput" class="search-bar" placeholder="Search music..." onkeyup="filterMusic()">
        </div>
        <div class="categories" id="cat-filters">
            <button class="cat-btn active" onclick="filterCategory('All')">All</button>
            <button class="cat-btn" onclick="filterCategory('Hip Hop')">Hip Hop</button>
            <button class="cat-btn" onclick="filterCategory('Lofi')">Lofi</button>
            <button class="cat-btn" onclick="filterCategory('Remix')">Remix</button>
            <button class="cat-btn" onclick="filterCategory('Sinhala')">Sinhala</button>
        </div>
        <div class="grid" id="video-container">
            <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
        </div>
    </section>

    <section id="contact">
        <div class="glass-card reveal" style="max-width: 500px; margin: auto; text-align: center;">
            <h2 class="neon">CONTACT</h2><br>
            <p id="latest-info"></p><br>
            <h3 id="c-email" style="color: var(--primary);"></h3><br>
            <div class="contact-links">
                <a href="https://youtube.com/@MusicNooo" target="_blank"><i class="fab fa-youtube"></i></a>
                <a href="https://instagram.com/abhishek_malik28" target="_blank"><i class="fab fa-instagram"></i></a>
                <a href="https://facebook.com/Malik.Abhishek28" target="_blank"><i class="fab fa-facebook"></i></a>
            </div>
        </div>
    </section>

    <footer class="footer-section">
        <p>© 2026 <span class="neon">MUSIC NOOO</span>. All Rights Reserved.</p>
    </footer>

    <script>
        let allVideos = [];
        let currentCategory = 'All';

        // --- 3. AUTO-SAVE DARK MODE ---
        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            document.getElementById('t-icon').className = savedTheme === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
        }
        initTheme();

        function toggleTheme() {
            const body = document.documentElement;
            const newTheme = body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            body.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            document.getElementById('t-icon').className = newTheme === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
        }

        // --- 4. SCROLL REVEAL LOGIC ---
        function reveal() {
            var reveals = document.querySelectorAll(".reveal");
            reveals.forEach(r => {
                var windowHeight = window.innerHeight;
                var elementTop = r.getBoundingClientRect().top;
                if (elementTop < windowHeight - 100) r.classList.add("active");
            });
        }
        window.addEventListener("scroll", reveal);

        window.addEventListener('load', () => {
            setTimeout(() => document.getElementById('preloader').classList.add('fade-out'), 1500);
        });

        function showPage(pageId) {
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.getElementById('nav-' + pageId).classList.add('active');
            window.scrollTo(0, 0);
            setTimeout(reveal, 100);
        }

        function copyLink(link) {
            navigator.clipboard.writeText(link);
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // --- 2. WHATSAPP SHARE ---
        function shareWA(title, link) {
            const text = encodeURIComponent(`Check out this music: ${title}\n\n${link}`);
            window.open(`https://wa.me/?text=${text}`, '_blank');
        }

        function filterMusic() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allVideos.filter(v => (currentCategory === 'All' || v.category === currentCategory) && v.title.toLowerCase().includes(query));
            renderVideos(filtered);
        }

        function renderVideos(videoList) {
            const container = document.getElementById('video-container');
            container.innerHTML = videoList.map(v => `
                <div class="glass-card reveal">
                    ${v.trending ? '<div class="trending-tag">TRENDING</div>' : ''}
                    <img src="${v.thumbnail}">
                    <h3 style="font-size: 0.9rem; margin-bottom: 15px;">${v.title}</h3>
                    <div style="display:flex; gap: 5px; flex-wrap: wrap;">
                        <a href="${v.youtube_link}" target="_blank" class="btn btn-main" style="flex:2; text-align:center;">WATCH</a>
                        <button onclick="copyLink('${v.youtube_link}')" class="btn btn-outline" style="width: 40px;"><i class="fas fa-link"></i></button>
                        <button onclick="shareWA('${v.title}', '${v.youtube_link}')" class="btn btn-outline btn-whatsapp" style="width: 40px;"><i class="fab fa-whatsapp"></i></button>
                    </div>
                </div>`).join('');
            setTimeout(reveal, 100);
        }

        // --- 1. SKELETON LOADING EXECUTION ---
        fetch('/videos.json').then(res => res.json()).then(data => {
            allVideos = data.videos;
            // Home Featured
            const featured = data.videos.slice(0, 3);
            document.getElementById('featured-grid').innerHTML = featured.map(v => `
                <div class="glass-card reveal">
                    <img src="${v.thumbnail}">
                    <p style="font-size:0.7rem;">${v.title}</p>
                </div>
            `).join('');
            
            renderVideos(allVideos);
            document.getElementById('c-email').innerText = data.contact.email;
            document.getElementById('latest-info').innerText = data.home_text;
            setTimeout(reveal, 500);
        });
    </script>
</body>
            </html>
