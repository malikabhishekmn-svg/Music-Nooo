<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUSIC NOOO | OFFICIAL</title>
    
    <link rel="icon" type="image/png" href="https://img.icons8.com/neon/96/musical-notes.png">
    
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #00f2ff; --secondary: #7000ff; --bg: #050505; --text: #ffffff;
            --glass: rgba(255, 255, 255, 0.05); --blur: blur(20px);
        }
        [data-theme="light"] {
            --primary: #0072ff; --secondary: #6200ea; --bg: #f0f2f5; --text: #1a1a1a;
            --glass: rgba(0, 0, 0, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: all 0.4s ease; }
        body { background: var(--bg); color: var(--text); font-family: 'Poppins', sans-serif; overflow-x: hidden; }

        /* Liquid Background Animation */
        .liquid-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: linear-gradient(45deg, var(--bg), #1a0033, #001a33, var(--bg));
            background-size: 400% 400%; animation: liquidMove 15s infinite alternate;
            filter: blur(60px); opacity: 0.5;
        }
        @keyframes liquidMove { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }

        /* Navigation Bar */
        nav {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: var(--glass); backdrop-filter: var(--blur);
            padding: 12px 35px; border-radius: 50px; display: flex; gap: 25px; align-items: center;
            border: 1px solid rgba(255,255,255,0.1); z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        nav a { color: var(--text); text-decoration: none; font-weight: 600; font-size: 0.85rem; letter-spacing: 1px; }
        nav a:hover, nav a.active { color: var(--primary); text-shadow: 0 0 10px var(--primary); }

        /* Sections */
        section { display: none; padding: 110px 8% 50px; min-height: 100vh; animation: pageIn 0.6s ease-out; }
        section.active { display: block; }
        @keyframes pageIn { from { opacity: 0; filter: blur(10px); } to { opacity: 1; filter: blur(0); } }

        /* Home Page - Slider Style */
        .hero { text-align: center; }
        .hero h1 { font-family: 'Syncopate', sans-serif; font-size: clamp(2.5rem, 10vw, 6rem); line-height: 1; margin-bottom: 20px; }
        .neon { color: var(--primary); text-shadow: 0 0 30px var(--primary); }

        /* NEW: Horizontal Video Preview (Slider) */
        .preview-container {
            width: 100%; padding: 40px 0; display: flex; gap: 20px; overflow-x: auto;
            scroll-behavior: smooth; scrollbar-width: none;
        }
        .preview-container::-webkit-scrollbar { display: none; }
        .preview-item {
            min-width: 280px; height: 160px; border-radius: 20px; background-size: cover;
            background-position: center; border: 2px solid var(--glass);
            cursor: pointer; position: relative; flex-shrink: 0;
            animation: float 4s infinite ease-in-out;
        }
        .preview-item:nth-child(even) { animation-delay: 2s; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        /* Video/Contact Cards */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; margin-top: 30px; }
        .glass-card {
            background: var(--glass); backdrop-filter: var(--blur); border-radius: 25px;
            padding: 20px; border: 1px solid rgba(255,255,255,0.1); position: relative;
        }
        .glass-card img { width: 100%; border-radius: 18px; margin-bottom: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        
        .btn {
            display: inline-block; padding: 10px 22px; background: linear-gradient(90deg, var(--primary), var(--secondary));
            color: white; border-radius: 12px; text-decoration: none; font-weight: bold; font-size: 0.8rem;
            box-shadow: 0 5px 15px rgba(0,242,255,0.3);
        }
        .btn:hover { transform: scale(1.1); box-shadow: 0 0 25px var(--primary); }

        .theme-toggle { cursor: pointer; color: var(--primary); font-size: 1.2rem; }

    </style>
</head>
<body>
    <div class="liquid-bg"></div>

    <nav>
        <a href="#" onclick="showPage('home')" id="nav-home" class="active">HOME</a>
        <a href="#" onclick="showPage('videos')" id="nav-videos">VIDEOS</a>
        <a href="#" onclick="showPage('contact')" id="nav-contact">CONTACT</a>
        <div class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon" id="t-icon"></i></div>
    </nav>

    <section id="home" class="active">
        <div class="hero">
            <h1 data-aos="zoom-in">MUSIC <br><span class="neon">NOOO</span></h1>
            <p id="latest-info" style="letter-spacing: 2px; text-transform: uppercase; font-size: 0.8rem; opacity: 0.7;"></p>
            
            <div class="preview-container" id="home-preview">
                </div>
            
            <br>
            <a href="#" onclick="showPage('videos')" class="btn" style="padding: 15px 40px;">EXPLORE ALL</a>
        </div>
    </section>

    <section id="videos">
        <h2 class="neon">LIBRARY</h2>
        <div class="grid" id="video-container"></div>
    </section>

    <section id="contact">
        <h2 class="neon">CONNECT</h2>
        <div class="grid">
            <div class="glass-card">
                <i class="fas fa-envelope neon" style="font-size: 2rem;"></i><br><br>
                <h3>Official Mail</h3>
                <p id="c-email" style="opacity: 0.8;"></p>
            </div>
            <div class="glass-card">
                <i class="fab fa-instagram neon" style="font-size: 2rem;"></i><br><br>
                <h3>Socials</h3>
                <p>Stay updated on Instagram & YouTube</p>
            </div>
        </div>
    </section>

    <script>
        function showPage(pageId) {
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.getElementById('nav-' + pageId).classList.add('active');
            window.scrollTo(0,0);
        }

        function toggleTheme() {
            const body = document.documentElement;
            const icon = document.getElementById('t-icon');
            if (body.getAttribute('data-theme') === 'dark') {
                body.setAttribute('data-theme', 'light');
                icon.classList.replace('fa-moon', 'fa-sun');
            } else {
                body.setAttribute('data-theme', 'dark');
                icon.classList.replace('fa-sun', 'fa-moon');
            }
        }

        fetch('/videos.json').then(res => res.json()).then(data => {
            const container = document.getElementById('video-container');
            const preview = document.getElementById('home-preview');
            
            // Load Full Grid
            data.videos.forEach(v => {
                container.innerHTML += `
                    <div class="glass-card">
                        <img src="${v.thumbnail}" alt="thumb">
                        <h4 style="margin-bottom:15px;">${v.title}</h4>
                        <a href="${v.youtube_link}" class="btn">WATCH</a>
                        <a href="${v.download_link}" class="btn" style="background:transparent; border:1px solid var(--primary); margin-left:5px;">MP3</a>
                    </div>`;
                
                // Load Home Slider Preview
                preview.innerHTML += `
                    <div class="preview-item" style="background-image: url('${v.thumbnail}')" onclick="showPage('videos')">
                        <div style="position:absolute; bottom:10px; left:10px; font-size:0.7rem; background:rgba(0,0,0,0.6); padding:2px 10px; border-radius:10px;">${v.title}</div>
                    </div>`;
            });

            document.getElementById('c-email').innerText = data.contact.email;
            document.getElementById('latest-info').innerText = data.home_text;
        });
    </script>
</body>
</html>
