<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUSIC NOOO | PORTAL</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --bg: #0a0a0a; --card: #151515; }
        body { background: var(--bg); color: white; font-family: 'Poppins', sans-serif; margin: 0; text-align: center; }
        .hero { padding: 100px 20px; background: linear-gradient(rgba(0,0,0,0.8), #0a0a0a), url('https://wallpaperaccess.com/full/1154341.jpg'); background-size: cover; }
        h1 { font-size: 4rem; color: var(--neon); text-shadow: 0 0 20px var(--neon); margin: 0; }
        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; padding: 50px 8%; }
        .card { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid #333; transition: 0.3s; }
        .card:hover { transform: translateY(-10px); border-color: var(--neon); box-shadow: 0 0 20px var(--neon); }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-body { padding: 20px; }
        .btn { display: inline-block; padding: 10px 20px; background: var(--neon); color: black; text-decoration: none; border-radius: 5px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="hero">
        <h1>MUSIC NOOO</h1>
        <p>Official Video & Music Portal</p>
    </div>

    <div class="container" id="video-list">
        </div>

    <script>
        // Netlify CMS එකෙන් දාන Data මෙතනට Load කරන සරල Script එකක්
        fetch('/videos.json')
            .then(response => response.json())
            .then(data => {
                const list = document.getElementById('video-list');
                data.videos.forEach(v => {
                    list.innerHTML += `
                        <div class="card">
                            <img src="${v.thumbnail}" alt="thumb">
                            <div class="card-body">
                                <h3>${v.title}</h3>
                                <a href="${v.youtube_link}" target="_blank" class="btn" style="background:#555; color:white;">WATCH</a>
                                <a href="${v.download_link}" class="btn">DOWNLOAD MP3</a>
                            </div>
                        </div>
                    `;
                });
            });
    </script>
</body>
</html>
