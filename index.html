<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUSIC NOOO | OFFICIAL</title>
    <link rel="icon" type="image/png" href="https://img.icons8.com/neon/96/musical-notes.png">
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #00f2ff; --secondary: #7000ff; --bg: #050505; --text: #ffffff;
            --glass: rgba(255, 255, 255, 0.05); --card-border: rgba(255, 255, 255, 0.1);
            --blur: blur(20px); --shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        [data-theme="light"] {
            --primary: #0072ff; --secondary: #6200ea; --bg: #eef2f7; --text: #1a1a1a;
            --glass: rgba(255, 255, 255, 0.75); --card-border: rgba(0, 0, 0, 0.05);
            --blur: blur(15px); --shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* Transition properties fixed to prevent jumping */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: var(--bg); color: var(--text); font-family: 'Poppins', sans-serif; 
            overflow-x: hidden; min-height: 100vh;
            transition: background 0.5s ease, color 0.5s ease;
        }

        .liquid-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: linear-gradient(135deg, var(--bg) 20%, var(--secondary) 150%);
            opacity: 0.4;
        }

        /* Fixed Navigation - No jumping anymore */
        nav {
            position: fixed; top: 25px; left: 50%; transform: translateX(-50%);
            background: var(--glass); backdrop-filter: var(--blur);
            padding: 8px 25px; border-radius: 100px; display: flex; gap: 15px; align-items: center;
            border: 1px solid var(--card-border); z-index: 1000; box-shadow: var(--shadow);
            width: max-content; /* Helps keep it centered */
        }
        nav a { color: var(--text); text-decoration: none; font-weight: 700; font-size: 0.7rem; letter-spacing: 1.5px; padding: 10px 18px; border-radius: 50px; transition: 0.3s; }
        nav a.active { background: var(--primary); color: #000; box-shadow: 0 0 15px var(--primary); }

        .theme-btn {
            width: 40px; height: 40px; background: var(--text); color: var(--bg);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            cursor: pointer; font-size: 1.1rem; margin-left: 5px; transition: 0.3s;
        }

        section { display: none; padding: 140px 10% 60px; animation: slideIn 0.8s ease; }
        section.active { display: block; }
        @keyframes slideIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        .hero h1 { font-family: 'Syncopate', sans-serif; font-size: clamp(2.5rem, 8vw, 5.5rem); line-height: 0.9; }
        .neon { color: var(--primary); text-shadow: 0 0 30px var(--primary); }

        /* --- AUTO SLIDER --- */
        .preview-wrapper { width: 100%; overflow: hidden; padding: 40px 0; mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent); }
        .preview-container { display: flex; gap: 25px; width: max-content; animation: autoScroll 30s linear infinite; }
        .preview-container:hover { animation-play-state: paused; } /* Hover කරාම නවතිනවා */

        @keyframes autoScroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(calc(-325px * 4)); } /* Adjust based on item count */
        }

        .preview-item {
            width: 300px; height: 180px; border-radius: 30px; 
            background-size: cover; background-position: center;
            border: 2px solid var(--card-border); cursor: pointer;
            box-shadow: var(--shadow); transition: 0.4s; flex-shrink: 0;
        }
        .preview-item:hover { border-color: var(--primary); transform: scale(1.05); }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; }
        .glass-card {
            background: var(--glass); backdrop-filter: var(--blur); border-radius: 35px;
            padding: 25px; border: 1px solid var(--card-border); box-shadow: var(--shadow); transition: 0.4s;
        }
        .glass-card:hover { transform: translateY(-10px); border-color: var(--primary); }
        .glass-card img { width: 100%; border-radius: 25px; margin-bottom: 20px; }
        
        .btn { padding: 12px 25px; border-radius: 15px; text-decoration: none; font-weight: 700; font-size: 0.8rem; display: inline-block; transition: 0.3s; }
        .btn-main { background: var(--primary); color: #000; box-shadow: 0 5px 20px rgba(0,242,255,0.4); }
        .btn-outline { border: 2px solid var(--primary); color: var(--text); margin-left: 10px; }

    </style>
</head>
<body>
    <div class="liquid-bg"></div>

    <nav id="main-nav">
        <a href="#" onclick="showPage('home')" id="nav-home" class="active">HOME</a>
        <a href="#" onclick="showPage('videos')" id="nav-videos">VIDEOS</a>
        <a href="#" onclick="showPage('contact')" id="nav-contact">CONTACT</a>
        <div class="theme-btn" onclick="toggleTheme()"><i class="fas fa-moon" id="t-icon"></i></div>
    </nav>

    <section id="home" class="active">
        <div class="hero">
            <p style="letter-spacing: 5px; opacity: 0.6; margin-bottom: 10px;">WELCOME TO</p>
            <h1>MUSIC <br><span class="neon">NOOO</span></h1>
            
            <div class="preview-wrapper">
                <div class="preview-container" id="home-preview">
                    </div>
            </div>
            
            <a href="#" onclick="showPage('videos')" class="btn btn-main" style="margin-top: 10px; padding: 18px 45px; border-radius: 50px;">BROWSE MUSIC</a>
        </div>
    </section>

    <section id="videos">
        <h2 style="font-family: 'Syncopate'; margin-bottom: 40px;">THE <span class="neon">LIBRARY</span></h2>
        <div class="grid" id="video-container"></div>
    </section>

    <section id="contact">
        <div class="glass-card" style="max-width: 600px; margin: auto; text-align: center;">
            <h2 class="neon" style="font-family: 'Syncopate';">CONTACT</h2><br>
            <p id="latest-info" style="margin-bottom: 20px; opacity: 0.8;"></p>
            <h3 id="c-email" style="color: var(--primary);"></h3><br>
            <div style="font-size: 2rem; display: flex; justify-content: center; gap: 30px;">
                <i class="fab fa-youtube"></i><i class="fab fa-instagram"></i><i class="fab fa-facebook"></i>
            </div>
        </div>
    </section>

    <script>
        function showPage(pageId) {
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.getElementById('nav-' + pageId).classList.add('active');
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function toggleTheme() {
            const body = document.documentElement;
            const icon = document.getElementById('t-icon');
            // Remove global transitions temporarily to prevent jump
            document.getElementById('main-nav').style.transition = 'none';
            
            if (body.getAttribute('data-theme') === 'dark') {
                body.setAttribute('data-theme', 'light');
                icon.classList.replace('fa-moon', 'fa-sun');
            } else {
                body.setAttribute('data-theme', 'dark');
                icon.classList.replace('fa-sun', 'fa-moon');
            }
            
            setTimeout(() => { document.getElementById('main-nav').style.transition = 'background 0.3s ease'; }, 100);
        }

        fetch('/videos.json').then(res => res.json()).then(data => {
            const container = document.getElementById('video-container');
            const preview = document.getElementById('home-preview');
            
            // Render grid
            data.videos.forEach(v => {
                container.innerHTML += `
                    <div class="glass-card">
                        <img src="${v.thumbnail}" alt="thumb">
                        <h3 style="margin-bottom:20px; font-size: 1.1rem;">${v.title}</h3>
                        <a href="${v.youtube_link}" target="_blank" class="btn btn-main">WATCH</a>
                        <a href="${v.download_link}" class="btn btn-outline">MP3</a>
                    </div>`;
            });

            // Render Auto-Slider (Double the items for seamless infinite scroll)
            const sliderItems = [...data.videos, ...data.videos, ...data.videos]; 
            sliderItems.forEach(v => {
                preview.innerHTML += `
                    <div class="preview-item" style="background-image: linear-gradient(to top, rgba(0,0,0,0.8), transparent), url('${v.thumbnail}')" onclick="showPage('videos')">
                        <div style="padding: 20px; height: 100%; display: flex; align-items: flex-end; font-weight: bold; font-size: 0.8rem; color: #fff;">${v.title}</div>
                    </div>`;
            });

            document.getElementById('c-email').innerText = data.contact.email;
            document.getElementById('latest-info').innerText = data.home_text;
        });
    </script>
</body>
</html>
