backend:
  name: git-gateway
  branch: main

collections:
  - name: "content"
    label: "Site Content"
    files:
      - label: "Website Data"
        name: "data"
        file: "videos.json"
        fields:
          - {label: "Home Page Message", name: "home_text", widget: "string"}
          - label: "Contact Info"
            name: "contact"
            widget: "object"
            fields:
              - {label: "Email Address", name: "email", widget: "string"}
          - label: "Video List"
            name: "videos"
            widget: "list"
            fields:
              - {label: "Video Title", name: "title", widget: "string"}
              - {label: "Thumbnail URL", name: "thumbnail", widget: "string"}
              - {label: "YouTube Link", name: "youtube_link", widget: "string"}
              - {label: "Download MP3 Link", name: "download_link", widget: "string"}
